<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Marquee - Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="partner-embed">
        <div class="wrap">
            <div class="marquee">
                <div class="marquee-track">
                    <div class="item"><img src="assets/acer.png" alt="Acer"></div>
                    <div class="item"><img src="assets/amd.jpg" alt="AMD"></div>
                    <div class="item"><img src="assets/ASRock.png" alt="ASRock"></div>
                    <div class="item"><img src="assets/Asus.png" alt="Asus"></div>
                    <div class="item"><img src="assets/da.jpg" alt="DA"></div>
                    <div class="item"><img src="assets/intel.png" alt="Intel"></div>
                    <div class="item"><img src="assets/Logitech-G.png" alt="Logitech G"></div>
                    <div class="item"><img src="assets/Nvidia Geforce.png" alt="Nvidia"></div>
                    <div class="item"><img src="assets/predator-acer.jpg" alt="Predator"></div>
                    <div class="item"><img src="assets/ROG.png" alt="ROG"></div>
                    <div class="item"><img src="assets/sades.png" alt="Sades"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
